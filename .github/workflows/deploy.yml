name: Deploy to GCE
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1022630044535/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-deployer@market-place-489716.iam.gserviceaccount.com
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Docker Auth
        run: |-
          gcloud auth configure-docker europe-west10-docker.pkg.dev
      - name: Build and Push Container
        working-directory: apps/auth-service
        run: |-
          get_env () {
            gcloud secrets versions access latest --secret="$1"
          }
          
          NODE_ENV=$(get_env NODE_ENV)
          
          docker build -t europe-west10-docker.pkg.dev/market-place-489716/monorepo/auth-service:${{ github.sha }} .
          docker push europe-west10-docker.pkg.dev/market-place-489716/monorepo/auth-service:${{ github.sha }}
      - name: Set Environment variables
        run: |-
          get_env () {
            gcloud secrets versions access latest --secret "$1"
          }

          NODE_ENV=$(get_env NODE_ENV)
          DB_HOST=$(get_env DB_HOST)
          DB_NAME=$(get_env DB_NAME)
          DB_PASSWORD=$(get_env DB_PASSWORD)
          DB_USER=$(get_env DB_USER)
          HOST=$(get_env HOST)
          PORT=$(get_env PORT)
          CORS_ORIGIN=$(get_env CORS_ORIGIN)
          CORS_HEADERS=$(get_env CORS_HEADERS)
          CORS_METHODS=$(get_env CORS_METHODS)
          JWT_TTL=$(get_env JWT_TTL)
          JWT_SECRET=$(get_env JWT_SECRET)
          JWT_AUD=$(get_env JWT_AUD)
      - name: Deploy to GCE
        run: |-
          gcloud compute ssh auth-service \
            --zone europe-west10-c \
            --project market-place-489716 \
            --command "
              gcloud auth configure-docker europe-west10-docker.pkg.dev --quiet
          
              docker pull europe-west10-docker.pkg.dev/market-place-489716/monorepo/auth-service:${{ github.sha }}
          
              docker stop auth-service || true
              docker rm auth-service || true
              docker run -d --name auth-service -p 3000:3000 \
                -e NODE_ENV="$NODE_ENV" \
                -e DB_HOST="$DB_HOST" \
                -e DB_NAME="$DB_NAME" \
                -e DB_USER="$DB_USER" \
                -e DB_PASSWORD="$DB_PASSWORD" \
                -e HOST="$HOST" \
                -e PORT="$PORT" \
                -e CORS_ORIGIN="$CORS_ORIGIN" \
                -e CORS_HEADERS="$CORS_HEADERS" \
                -e CORS_METHODS="$CORS_METHODS" \
                -e JWT_TTL="$JWT_TTL" \
                -e JWT_SECRET="$JWT_SECRET" \
                -e JWT_AUD="$JWT_AUD" \
                europe-west10-docker.pkg.dev/market-place-489716/monorepo/auth-service:${{ github.sha }}
            "
