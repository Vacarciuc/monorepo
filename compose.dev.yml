services:
  auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5432:5432"
    volumes: [auth-db-data:/var/lib/postgresql/data]
    networks: [marketplace-network]
    healthcheck: &pg-healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile.dev
    env_file: ./apps/auth-service/.env.development
    init: true
    ports:
      - "3001:3000"
    restart: no
    scale: 1
    mem_limit: 2G
    cpu_count: 1
    develop:
      watch:
        - action: sync+restart
          path: ./apps/auth-service/src/
          target: /app/src/
        - action: rebuild
          path: ./apps/auth-service/package.json
        - action: sync+restart
          path: ./apps/auth-service/nest-cli.json
          target: /app/nest-cli.json
    depends_on:
      auth-db:
        condition: service_started
    networks: [marketplace-network]
    healthcheck: &node-healthcheck
      test:
        [
          "CMD",
          "curl",
          "-X",
          "GET",
          "http://localhost:3000/api/v1/health",
          "-H",
          "accept: application/json",
        ]
      interval: 10s
      timeout: 1s
      retries: 2
      start_period: 5s

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile.dev
    env_file: ./apps/gateway/.env.development
    init: true
    ports:
      - "3000:3000"
    restart: no
    scale: 1
    mem_limit: 2G
    cpu_count: 1
    develop:
      watch:
        - action: sync+restart
          path: ./apps/gateway/src/
          target: /app/src/
        - action: rebuild
          path: ./apps/gateway/package.json
        - action: sync+restart
          path: ./apps/gateway/nest-cli.json
          target: /app/nest-cli.json
    depends_on:
      auth-service:
        condition: service_started
    networks: [marketplace-network]
    healthcheck: *node-healthcheck

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASS}
    volumes: [rabbitmq-data:/var/lib/rabbitmq]
    networks: [marketplace-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${ORDER_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_SERVICE_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_SERVICE_DB_NAME}
    ports:
      - "5433:5432"
    volumes: [order-db-data:/var/lib/postgresql/data]
    networks: [marketplace-network]
    healthcheck: *pg-healthcheck

  order-service:
    build:
      context: ./apps/order-service
      dockerfile: Dockerfile.dev
    env_file: [./apps/order-service/.env.development]
    init: true
    ports:
      - "3002:3000"
    depends_on:
      - order-db
    networks: [marketplace-network]

  seller-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${SELLER_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${SELLER_SERVICE_DB_PASSWORD}
      POSTGRES_DB: ${SELLER_SERVICE_DB_NAME}
    ports:
      - "5434:5432"
    volumes: [seller-db-data:/var/lib/postgresql/data]
    networks: [marketplace-network]
    healthcheck: *pg-healthcheck

  seller-service:
    build:
      context: ./apps/seller-service
      dockerfile: Dockerfile.dev
    env_file: ./apps/seller-service/.env.development
    init: true
    ports:
      - "3003:3000"
    develop:
      watch:
        - action: sync+restart
          path: ./apps/seller-service/src/
          target: /app/src/
        - action: rebuild
          path: ./apps/seller-service/package.json
        - action: sync+restart
          path: ./apps/seller-service/nest-cli.json
          target: /app/nest-cli.json
    depends_on:
      seller-db:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks: [marketplace-network]
    healthcheck: *node-healthcheck

volumes:
  auth-db-data:
  order-db-data:
  rabbitmq-data:
  seller-db-data:

networks:
  marketplace-network:
    driver: bridge
    attachable: true
    enable_ipv6: false
