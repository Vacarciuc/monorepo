services:
  auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5432:5432"
    volumes: [ auth-db-data:/var/lib/postgresql/data ]
    networks: [ marketplace-network ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 3

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    env_file: [ ./apps/auth-service/.env.development ]
    init: true
    ports:
      - "3001:3000"
    depends_on:
      - auth-db
    networks: [ marketplace-network ]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASS}
    volumes: [ rabbitmq-data:/var/lib/rabbitmq ]
    networks: [ marketplace-network ]
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth-db-data:
  rabbitmq-data:

networks:
  marketplace-network:
    driver: bridge

